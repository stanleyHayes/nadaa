name: CI

# Orchestrator: triggers on PRs and pushes to main, then delegates to the
# focused reusable workflows (web / go / docker). Docker builds only run once
# web and go pass. Each job's steps live in its own small workflow file.
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web
    uses: ./.github/workflows/web.yml

  go:
    name: Go
    uses: ./.github/workflows/go.yml

  docker:
    name: Docker
    needs:
      - web
      - go
    uses: ./.github/workflows/docker.yml
