name: Docker Builds

# Reusable: called by ci.yml after web + go pass. Builds (no push) every app
# and service image to catch Dockerfile regressions.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  docker-builds:
    name: Docker Build (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: marketing-web
            dockerfile: apps/marketing-web/Dockerfile
          - name: citizen-web
            dockerfile: apps/citizen-web/Dockerfile
          - name: authority-dashboard
            dockerfile: apps/authority-dashboard/Dockerfile
          - name: dispatcher-web
            dockerfile: apps/dispatcher-web/Dockerfile
          - name: admin-web
            dockerfile: apps/admin-web/Dockerfile
          - name: agency-web
            dockerfile: apps/agency-web/Dockerfile
          - name: alert-service
            dockerfile: services/alert-service/Dockerfile
          - name: auth-service
            dockerfile: services/auth-service/Dockerfile
          - name: incident-service
            dockerfile: services/incident-service/Dockerfile
          - name: guide-service
            dockerfile: services/guide-service/Dockerfile
          - name: integration-service
            dockerfile: services/integration-service/Dockerfile
          - name: ml-service
            dockerfile: services/ml-service/Dockerfile
          - name: notification-service
            dockerfile: services/notification-service/Dockerfile
          - name: risk-service
            dockerfile: services/risk-service/Dockerfile
          - name: road-closure-service
            dockerfile: services/road-closure-service/Dockerfile
          - name: route-service
            dockerfile: services/route-service/Dockerfile
          - name: school-service
            dockerfile: services/school-service/Dockerfile
          - name: donation-service
            dockerfile: services/donation-service/Dockerfile
          - name: missing-person-service
            dockerfile: services/missing-person-service/Dockerfile
          - name: open-data-service
            dockerfile: services/open-data-service/Dockerfile
          - name: damage-claim-service
            dockerfile: services/damage-claim-service/Dockerfile
          - name: shelter-service
            dockerfile: services/shelter-service/Dockerfile
          - name: imagery-service
            dockerfile: services/imagery-service/Dockerfile
          - name: campaign-service
            dockerfile: services/campaign-service/Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: false
          tags: nadaa/${{ matrix.image.name }}:${{ github.sha }}
