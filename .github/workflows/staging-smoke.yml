name: Staging Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke Staging URLs
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run staging smoke checks
        env:
          STAGING_CITIZEN_URL: ${{ vars.STAGING_CITIZEN_URL }}
          STAGING_AUTHORITY_URL: ${{ vars.STAGING_AUTHORITY_URL }}
          STAGING_DISPATCHER_URL: ${{ vars.STAGING_DISPATCHER_URL }}
          STAGING_ADMIN_URL: ${{ vars.STAGING_ADMIN_URL }}
          STAGING_ALERT_SERVICE_URL: ${{ vars.STAGING_ALERT_SERVICE_URL }}
          STAGING_AUTH_SERVICE_URL: ${{ vars.STAGING_AUTH_SERVICE_URL }}
          STAGING_INCIDENT_SERVICE_URL: ${{ vars.STAGING_INCIDENT_SERVICE_URL }}
          STAGING_GUIDE_SERVICE_URL: ${{ vars.STAGING_GUIDE_SERVICE_URL }}
          STAGING_INTEGRATION_SERVICE_URL: ${{ vars.STAGING_INTEGRATION_SERVICE_URL }}
          STAGING_ML_SERVICE_URL: ${{ vars.STAGING_ML_SERVICE_URL }}
          STAGING_NOTIFICATION_SERVICE_URL: ${{ vars.STAGING_NOTIFICATION_SERVICE_URL }}
          STAGING_RISK_SERVICE_URL: ${{ vars.STAGING_RISK_SERVICE_URL }}
        run: node scripts/smoke-staging.mjs
