services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: nadaa-postgres
    environment:
      POSTGRES_DB: nadaa
      POSTGRES_USER: nadaa
      POSTGRES_PASSWORD: nadaa_dev_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nadaa -d nadaa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nadaa-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: nadaa-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nadaa
      MINIO_ROOT_PASSWORD: nadaa_dev_password
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
