# NADAA — Render Blueprint (backend)
#
# Deploys the 18 Go microservices as Docker web services. The 6 Vite frontends
# deploy separately on Vercel (see docs/deployment/render-vercel.md). Every
# service is stdlib-only Go with an in-memory store, so no database is required
# for the MVP (data resets on redeploy).
#
# Ports: each service binds Render's injected $PORT (see resolveListenAddr in
# each service's config). Region is frankfurt (closest Render region to Ghana);
# change if you prefer another. Plan is starter; see the deploy doc for costs
# and the free-tier trade-off.
#
# Secrets (Arkesel, Paystack, auth token, inter-service URLs) are sync:false or
# generateValue — they are set in the Render dashboard, never committed. Until an
# Arkesel/Paystack key is supplied, notification + donation stay in sandbox mode.

envVarGroups:
  - name: nadaa-web-origins
    envVars:
      # Comma-separated Vercel frontend origins allowed to call the APIs (CORS).
      # Replace "*" with the deployed Vercel domains once the frontends exist,
      # e.g. https://nadaa-citizen.vercel.app,https://nadaa-authority.vercel.app
      - key: NADAA_ALLOWED_ORIGINS
        value: "*"

  # Shared auth/verifier config for every Go service. auth-service signs tokens
  # with NADAA_AUTH_TOKEN_SECRET and every other service verifies Bearer tokens
  # with the SAME value, so it is generated once here and shared via fromGroup
  # (auth-service joins this group too — do not re-declare the key per service).
  - name: nadaa-auth
    envVars:
      - key: NADAA_AUTH_TOKEN_SECRET
        generateValue: true
      # Production hardening — never trust self-asserted X-NADAA-Actor-* headers.
      - key: NADAA_AUTH_ALLOW_MOCK_ACTORS
        value: "false"
      # Disables development-only relaxations (dev OTPs, sandbox payment
      # auto-verify, localhost CORS echo).
      - key: NADAA_ENV
        value: "production"

  # Service-to-service token shared by internal caller/verifier pairs:
  # risk-service → ml-service, damage-claim-service → incident-service, and
  # open-data-service → auth-service (audit ingest).
  # Callers send it as X-NADAA-Service-Token; verifiers gate on it.
  - name: nadaa-internal-service
    envVars:
      - key: NADAA_INTERNAL_SERVICE_TOKEN
        generateValue: true

services:
  - name: nadaa-alert-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/alert-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth

  - name: nadaa-auth-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/auth-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      # nadaa-auth also supplies NADAA_AUTH_TOKEN_SECRET — auth-service signs
      # tokens with the same generated secret the other services verify with.
      - fromGroup: nadaa-auth
      # Production hardening — never expose OTPs.
      - key: NADAA_AUTH_EXPOSE_DEV_OTP
        value: "false"
      # Shared with open-data-service; verifies X-NADAA-Service-Token on the
      # POST /api/v1/audit/logs ingest endpoint (stays closed when unset).
      - fromGroup: nadaa-internal-service
      # Optional: seed the first system admin. Set these in the dashboard to
      # bootstrap login, then unset. Leave blank to skip bootstrapping. The MFA
      # secret must be a base32 TOTP seed (no constant fallback).
      - key: NADAA_AUTH_BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: NADAA_AUTH_BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: NADAA_AUTH_BOOTSTRAP_ADMIN_MFA_SECRET
        sync: false

  - name: nadaa-risk-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/risk-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth
      # Shared with ml-service; sent as X-NADAA-Service-Token on ML calls.
      - fromGroup: nadaa-internal-service
      # ml-service base URL for flood scoring; empty falls back to local scoring.
      # Set to the deployed ml-service URL INCLUDING the /api/v1 suffix (e.g.
      # https://nadaa-ml-service.onrender.com/api/v1) — risk-service POSTs
      # <this value>/ml/flood/predictions, so a bare origin 404s and silently
      # disables ML enrichment.
      - key: NADAA_ML_API_URL
        sync: false

  - name: nadaa-incident-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/incident-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth
      # Shared with damage-claim-service; verifies X-NADAA-Service-Token on
      # service-to-service incident lookups (read-only, no reporter contact).
      - fromGroup: nadaa-internal-service
      # Media bytes write to the container's ephemeral filesystem and are lost
      # on redeploy. Attach a Render disk mounted here for durable storage.
      - key: NADAA_INCIDENT_MEDIA_STORAGE_PATH
        value: /app/uploads/media
      # Externally reachable base URL used for absolute media uploadUrls. Set
      # to the deployed service URL (e.g. https://nadaa-incident-service.onrender.com).
      - key: NADAA_INCIDENT_PUBLIC_BASE_URL
        sync: false

  - name: nadaa-guide-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/guide-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth

  - name: nadaa-integration-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/integration-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth
      # road-closure-service base URL for closure imports.
      - key: NADAA_ROAD_CLOSURE_SERVICE_URL
        sync: false

  - name: nadaa-ml-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/ml-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth
      # Shared with risk-service; required on X-NADAA-Service-Token calls.
      - fromGroup: nadaa-internal-service
      # Model artifact directory is baked into the image by the Dockerfile
      # (ENV NADAA_ML_MODEL_DIR=/app/data/flood-risk/models); no override needed.

  - name: nadaa-notification-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/notification-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth
      # Upstream services (optional enrichment; with NADAA_ENV=production the
      # citizen feed reports a degraded status instead of serving fixtures when
      # alert-service is unreachable).
      - key: NADAA_ALERT_SERVICE_URL
        sync: false
      - key: NADAA_INCIDENT_SERVICE_URL
        sync: false
      # SMS via Arkesel. Set NADAA_SMS_PROVIDER=arkesel + the key to go live;
      # stays in sandbox (mock) until then.
      - key: NADAA_ARKESEL_API_KEY
        sync: false
      # Optional Expo push access token (push works without it).
      - key: NADAA_EXPO_ACCESS_TOKEN
        sync: false
      # Inbound SMS/USSD/WhatsApp provider webhooks must present the matching
      # secret in X-NADAA-Webhook-Secret once set; empty keeps sandbox open.
      - key: NADAA_SMS_WEBHOOK_SECRET
        sync: false
      - key: NADAA_USSD_WEBHOOK_SECRET
        sync: false
      - key: NADAA_WHATSAPP_WEBHOOK_SECRET
        sync: false

  - name: nadaa-shelter-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/shelter-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth

  - name: nadaa-road-closure-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/road-closure-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth

  - name: nadaa-route-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/route-service/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth
      # Planner enrichment sources (optional; local fallbacks if unset).
      - key: RISK_SERVICE_URL
        sync: false
      - key: ROAD_CLOSURE_SERVICE_URL
        sync: false
      - key: SHELTER_SERVICE_URL
        sync: false

  - name: nadaa-school-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/school-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth

  - name: nadaa-damage-claim-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/damage-claim-service/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth
      # Shared with incident-service; sent as X-NADAA-Service-Token on incident
      # lookups when the caller has no bearer token (public claim intake).
      - fromGroup: nadaa-internal-service
      - key: INCIDENT_SERVICE_URL
        sync: false

  - name: nadaa-donation-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/donation-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth
      # Payments via Paystack. Set NADAA_PAYMENT_PROVIDER=paystack + the key to
      # go live; stays in sandbox until then.
      - key: NADAA_PAYSTACK_SECRET_KEY
        sync: false
      - key: NADAA_PAYSTACK_CALLBACK_URL
        sync: false

  - name: nadaa-missing-person-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/missing-person-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth

  - name: nadaa-imagery-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/imagery-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth
      # Uploads write to the container's ephemeral filesystem and are lost on
      # redeploy. Attach a Render disk mounted here for durable storage.
      - key: IMAGERY_STORAGE_PATH
        value: /app/uploads
      # Externally reachable base URL used for geojson downloadUrls; falls back
      # to the request scheme/host when unset. Set to the deployed service URL.
      - key: NADAA_IMAGERY_PUBLIC_BASE_URL
        sync: false

  - name: nadaa-open-data-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/open-data-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth
      # Service token sent as X-NADAA-Service-Token when forwarding audit events.
      - fromGroup: nadaa-internal-service
      # auth-service base URL (audit-log sink).
      - key: AUDIT_LOG_SERVICE_URL
        sync: false

  - name: nadaa-campaign-service
    type: web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./services/campaign-service/Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - fromGroup: nadaa-web-origins
      - fromGroup: nadaa-auth
